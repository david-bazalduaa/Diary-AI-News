# config/sources.yaml

settings:
  max_articles_per_source: 5
  similarity_threshold: 0.85
  target_language: "en"

keywords:
  positive:
    # Core AI, Models & Architecture
    - "llm"
    - "generative ai"
    - "foundation model"
    - "transformer"
    - "rag"
    - "agentic"
    - "fine-tuning"
    
    # Specific Domains & Techniques
    - "nlp"
    - "computer vision"
    - "opencv"
    - "ocr"
    - "information extraction"
    - "deep learning"
    
    # Engineering, Data & Infrastructure
    - "mlops"
    - "pipeline"
    - "aws"
    - "sagemaker"
    - "snowflake"
    - "python"
    - "power bi"
    - "serverless"
    
    # Industry, Open Source & Releases
    - "open source"
    - "release"
    - "sota"
    - "state-of-the-art"
    - "startup"
    - "funding"
    - "github"

  negative:
    # Hype & Tech Noise
    - "crypto"
    - "bitcoin"
    - "nft"
    - "web3"
    - "metaverse"
    
    # Drama, Gossip & Non-technical
    - "elon musk"
    - "sam altman fired"
    - "politics"
    - "lawsuit"
    - "regulation"
    - "stock market"
    - "rumor"

feeds:
  # Official Blogs (Highest Priority / Weight)
  - name: "Google Research Blog"
    url: "https://blog.research.google/feeds/posts/default?alt=rss"
    default_category: "AI Research"
    weight: 50
    is_official: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    default_category: "Machine Learning / Open Source"
    weight: 45
    is_official: true

  - name: "AWS Machine Learning Blog"
    url: "https://aws.amazon.com/blogs/machine-learning/feed/"
    default_category: "MLOps / Cloud"
    weight: 45
    is_official: true

  # News & Startups (Medium Priority)
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    default_category: "Startups & Business"
    weight: 30
    is_official: false

  - name: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed/"
    default_category: "AI News"
    weight: 30
    is_official: false

  # Data Science & Tutorials
  - name: "KDnuggets"
    url: "https://www.kdnuggets.com/feed"
    default_category: "Data Science"
    weight: 35
    is_official: false

  - name: "MIT Technology Review - AI"
    url: "https://www.technologyreview.com/topic/artificial-intelligence/feed/"
    default_category: "Deep Dives"
    weight: 40
    is_official: false
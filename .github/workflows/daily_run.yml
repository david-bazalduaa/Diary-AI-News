name: Daily AI News Bot

# 1. When should this script run?
on:
  schedule:
    # Runs at 16:00 UTC every day (which is 10:00 AM in Mexico City - CST)
    - cron: '0 16 * * *'
  workflow_dispatch:
    # This line allows you to trigger the bot manually with a button in GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches dependencies to make the run faster

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install directly here since it's a small project, 
        # or use 'pip install -r requirements.txt' if you created one.
        pip install requests feedparser pyyaml scikit-learn google-genai

    - name: Run Pipeline
      env:
        # We map GitHub Secrets to the environment variables our Python code expects
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python src/main.py